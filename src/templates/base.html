<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{#if hasFonts}}
  <style>
    @font-face {
      font-family: 'IBM Plex Sans';
      src: url('data:font/woff2;base64,{{plexSansB64}}') format('woff2');
      font-weight: 100 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('data:font/woff2;base64,{{plexMono400B64}}') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('data:font/woff2;base64,{{plexMono600B64}}') format('woff2');
      font-weight: 600;
      font-style: normal;
    }
    {{#if jetbrainsMonoB64}}
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('data:font/woff2;base64,{{jetbrainsMonoB64}}') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    {{/if}}
    {{#if urbanistB64}}
    @font-face {
      font-family: 'Urbanist';
      src: url('data:font/woff2;base64,{{urbanistB64}}') format('woff2');
      font-weight: 100 900;
      font-style: normal;
    }
    {{/if}}
  </style>
  {{/if}}
  <style>
    {{{css}}}
  </style>
</head>
<body>
  <header class="doc-meta">
    <span class="doc-meta__dot"></span>
    <span class="doc-meta__label">{{label}}</span>
    <span class="doc-meta__timestamp">{{timestamp}}</span>
  </header>
  <main>
    {{{body}}}
  </main>
</body>
</html>
